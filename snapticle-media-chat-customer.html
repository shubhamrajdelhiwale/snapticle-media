<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Snapticle Media customer chat interface for quick order support, loyalty updates, and secure messaging on snapticlemedia.in." />
    <meta name="keywords" content="Snapticle Media, customer chat, restaurant support, loyalty points, order status" />
    <link rel="canonical" href="https://snapticlemedia.in/snapticle-media-chat-customer.html" />
    <meta property="og:title" content="Customer Chat - Snapticle Media" />
    <meta property="og:description" content="Customer chat interface for Snapticle Media to help customers connect with restaurant support and track loyalty rewards." />
    <meta property="og:url" content="https://snapticlemedia.in/snapticle-media-chat-customer.html" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Snapticle Media" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Customer Chat - Snapticle Media" />
    <meta name="twitter:description" content="Customer chat interface for Snapticle Media to help customers connect with restaurant support and track loyalty rewards." />
    <meta name="twitter:url" content="https://snapticlemedia.in/snapticle-media-chat-customer.html" />
    <title>Customer Chat - Snapticle Media</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                        },
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        .chat-bubble-left { border-radius: 4px 16px 16px 16px; }
        .chat-bubble-right { border-radius: 16px 16px 4px 16px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-100 via-white to-slate-50 font-sans text-slate-800 h-screen flex flex-col max-w-md mx-auto shadow-2xl bg-white border-x border-slate-100">

    <!-- Customer Header -->
    <header class="h-20 bg-white border-b border-slate-100 px-6 flex items-center justify-between sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-primary-500 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-primary-500/20">
                <i class="fas fa-utensils text-xl"></i>
            </div>
            <div>
                <h1 class="text-lg font-bold font-serif text-slate-900 leading-none">Snapticle Media</h1>
                <div class="flex items-center gap-1.5 mt-1">
                    <span class="w-2 h-2 bg-primary-500 rounded-full animate-pulse"></span>
                    <span class="text-[10px] font-bold text-primary-600 uppercase tracking-widest">Customer Chat</span>
                </div>
            </div>
        </div>
        <button class="w-10 h-10 bg-slate-50 rounded-full flex items-center justify-center text-slate-500">
            <i class="fas fa-phone-alt"></i>
        </button>
    </header>

    <div id="customerMeta" class="hidden px-6 py-4 bg-white border-b border-slate-100">
        <div class="flex items-center gap-3">
            <img id="customerAvatar" src="https://ui-avatars.com/api/?name=Customer&background=22c55e&color=fff" alt="Customer" class="w-14 h-14 rounded-3xl object-cover shadow-lg">
            <div class="min-w-0">
                <p id="customerNameLabel" class="font-bold text-slate-900 truncate">Welcome back</p>
                <p id="customerPhoneLabel" class="text-sm text-slate-500 truncate">Phone will appear here</p>
                <p id="customerEmailLabel" class="text-sm text-slate-500 truncate"></p>
            </div>
        </div>
    </div>

    <div id="loginOverlay" class="absolute inset-0 bg-slate-950/80 flex items-center justify-center p-4 z-50">
        <div class="w-full max-w-md bg-white rounded-[32px] p-6 shadow-2xl">
            <div class="mb-6 text-center">
                <p class="text-sm uppercase tracking-[0.2em] text-primary-600 font-bold">Snapticle Media</p>
                <h2 class="mt-3 text-2xl font-bold text-slate-900">Sign in to start chatting</h2>
                <p class="mt-2 text-sm text-slate-500">Enter your details to connect with our restaurant support team.</p>
            </div>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Full Name</label>
                    <input id="loginName" type="text" placeholder="Your name" class="w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-primary-500 focus:ring-2 focus:ring-primary-100" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Phone Number</label>
                    <input id="loginPhone" type="tel" placeholder="+91 98765 43210" class="w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-primary-500 focus:ring-2 focus:ring-primary-100" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Email (optional)</label>
                    <input id="loginEmail" type="email" placeholder="you@example.com" class="w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-primary-500 focus:ring-2 focus:ring-primary-100">
                </div>
                <p id="loginError" class="min-h-[1.25rem] text-sm text-rose-500"></p>
                <button type="submit" class="w-full rounded-3xl bg-primary-500 px-5 py-3 text-sm font-semibold text-white shadow-lg shadow-primary-500/20 hover:bg-primary-600 transition-all">Start Chat</button>
            </form>
        </div>
    </div>

    <div id="messagesArea" class="hidden flex-1 overflow-y-auto p-4 space-y-6 bg-slate-50/30 no-scrollbar">
        <!-- Messages will appear here -->
    </div>

    <!-- Quick Suggestions -->
    <div id="quickSuggestions" class="hidden px-4 py-3 flex gap-2 overflow-x-auto no-scrollbar bg-white border-t border-slate-50">
        <button class="suggestion-btn px-4 py-2 bg-slate-50 text-xs font-semibold text-slate-600 rounded-full whitespace-nowrap border border-slate-100 hover:bg-primary-50 hover:text-primary-600 transition-all">Where is my order?</button>
        <button class="suggestion-btn px-4 py-2 bg-slate-50 text-xs font-semibold text-slate-600 rounded-full whitespace-nowrap border border-slate-100 hover:bg-primary-50 hover:text-primary-600 transition-all">Show today's menu</button>
        <button class="suggestion-btn px-4 py-2 bg-slate-50 text-xs font-semibold text-slate-600 rounded-full whitespace-nowrap border border-slate-100 hover:bg-primary-50 hover:text-primary-600 transition-all">Need more tissues</button>
    </div>

    <!-- Input Area -->
    <div id="inputArea" class="hidden p-4 bg-white border-t border-slate-100">
        <div class="flex items-end gap-2 bg-slate-50 p-2 rounded-2xl border border-slate-100">
            <button class="p-2.5 text-slate-400 hover:text-primary-500"><i class="far fa-smile text-xl"></i></button>
            <textarea id="messageInput" rows="1" placeholder="Type your message..." class="flex-1 bg-transparent border-none focus:ring-0 py-2.5 text-sm resize-none"></textarea>
            <button id="sendMessage" class="w-10 h-10 bg-primary-500 text-white rounded-xl flex items-center justify-center shadow-lg shadow-primary-500/30 hover:bg-primary-600 transition-all">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAnApUBw_8fB-WOKZpHfJildkECHDe0-xo", 
            authDomain: "codehub-966c6.firebaseapp.com", 
            projectId: "codehub-966c6", 
            storageBucket: "codehub-966c6.firebasestorage.app", 
            messagingSenderId: "890882130005", 
            appId: "1:890882130005:web:ed75089f9100b3a7a654dc", 
            measurementId: "G-BB8FP2LYN4" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const storageKey = 'snapticle_customer_info';
        const urlParams = new URLSearchParams(window.location.search);
        let CUSTOMER_ID = urlParams.get('id');
        let customerInfo = null;

        const loginOverlay = document.getElementById('loginOverlay');
        const loginForm = document.getElementById('loginForm');
        const inputName = document.getElementById('loginName');
        const inputPhone = document.getElementById('loginPhone');
        const inputEmail = document.getElementById('loginEmail');
        const loginError = document.getElementById('loginError');
        const customerMeta = document.getElementById('customerMeta');
        const customerAvatar = document.getElementById('customerAvatar');
        const customerNameLabel = document.getElementById('customerNameLabel');
        const customerPhoneLabel = document.getElementById('customerPhoneLabel');
        const customerEmailLabel = document.getElementById('customerEmailLabel');
        const messagesArea = document.getElementById('messagesArea');
        const quickSuggestions = document.getElementById('quickSuggestions');
        const inputArea = document.getElementById('inputArea');
        const sendMessageBtn = document.getElementById('sendMessage');
        const messageInput = document.getElementById('messageInput');

        const suggestionButtons = Array.from(document.querySelectorAll('.suggestion-btn'));

        const storedInfo = loadStoredCustomer();
        if (!CUSTOMER_ID && storedInfo) {
            CUSTOMER_ID = normalizeId(storedInfo.phone || storedInfo.id || '');
            customerInfo = storedInfo;
        }

        if (CUSTOMER_ID) {
            initializeCustomer();
        } else {
            showLogin();
        }

        async function initializeCustomer() {
            if (customerInfo) {
                initializeChat();
                return;
            }

            const docRef = doc(db, 'restaurant_chats', CUSTOMER_ID);
            const snapshot = await getDoc(docRef);
            if (snapshot.exists()) {
                const data = snapshot.data();
                customerInfo = {
                    id: CUSTOMER_ID,
                    name: data.name || 'Guest',
                    phone: data.phone || '',
                    email: data.email || '',
                    avatar: data.avatar || buildAvatar(data.name || 'Guest'),
                };
                saveCustomerInfo(customerInfo);
                initializeChat();
            } else {
                showLogin();
            }
        }

        function normalizeId(value) {
            return value ? value.toString().replace(/\D/g, '') : '';
        }

        function loadStoredCustomer() {
            try {
                return JSON.parse(localStorage.getItem(storageKey));
            } catch (error) {
                return null;
            }
        }

        function saveCustomerInfo(info) {
            customerInfo = info;
            localStorage.setItem(storageKey, JSON.stringify(info));
        }

        function buildAvatar(name) {
            return `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=22c55e&color=fff&rounded=true`;
        }

        function showLogin() {
            loginOverlay.classList.remove('hidden');
            customerMeta.classList.add('hidden');
            messagesArea.classList.add('hidden');
            quickSuggestions.classList.add('hidden');
            inputArea.classList.add('hidden');
        }

        function showChat() {
            loginOverlay.classList.add('hidden');
            customerMeta.classList.remove('hidden');
            messagesArea.classList.remove('hidden');
            quickSuggestions.classList.remove('hidden');
            inputArea.classList.remove('hidden');
        }

        loginForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            loginError.textContent = '';

            const name = inputName.value.trim();
            const phone = inputPhone.value.trim();
            const email = inputEmail.value.trim();
            const normalizedPhone = normalizeId(phone);

            if (!name || !normalizedPhone) {
                loginError.textContent = 'Please enter your name and a valid phone number.';
                return;
            }

            CUSTOMER_ID = normalizedPhone;
            saveCustomerInfo({
                id: CUSTOMER_ID,
                name,
                phone,
                email,
                avatar: buildAvatar(name),
            });

            await ensureCustomerDocument();
            initializeChat();
        });

        async function initializeChat() {
            await ensureCustomerDocument();
            showChat();

            const customerDoc = doc(db, 'restaurant_chats', CUSTOMER_ID);
            onSnapshot(customerDoc, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    setCustomerHeader(data);
                    renderMessages(data.messages);
                }
            });
        }

        async function ensureCustomerDocument() {
            if (!CUSTOMER_ID || !customerInfo) return;
            const docRef = doc(db, 'restaurant_chats', CUSTOMER_ID);
            const snapshot = await getDoc(docRef);
            if (!snapshot.exists()) {
                await setDoc(docRef, {
                    id: CUSTOMER_ID,
                    name: customerInfo.name,
                    phone: customerInfo.phone,
                    email: customerInfo.email || '',
                    avatar: customerInfo.avatar,
                    messages: [],
                    lastMessage: '',
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                    unread: 0,
                    status: 'ACTIVE',
                    online: true
                });
            }
        }

        function setCustomerHeader(data) {
            const name = data.name || customerInfo.name || 'Guest';
            const phone = data.phone || customerInfo.phone || '';
            const email = data.email || customerInfo.email || '';

            customerAvatar.src = data.avatar || customerInfo.avatar;
            customerNameLabel.textContent = name;
            customerPhoneLabel.textContent = phone ? `Phone: ${phone}` : '';
            customerEmailLabel.textContent = email ? `Email: ${email}` : '';
        }

        function renderMessages(messages) {
            if (!messages) {
                messagesArea.innerHTML = '<div class="text-center text-slate-500">No messages yet. Send a message to begin.</div>';
                return;
            }

            messagesArea.innerHTML = messages.map(msg => {
                const isRestaurant = msg.type === 'restaurant';
                let content = '';

                if (msg.isOrder) {
                    content = `
                        <div class="bg-white rounded-3xl p-4 shadow-sm border border-slate-100 w-full">
                            <div class="flex items-center gap-3 mb-3 pb-3 border-b border-slate-100">
                                <div class="w-10 h-10 bg-primary-50 rounded-xl flex items-center justify-center text-primary-600"><i class="fas fa-shopping-bag"></i></div>
                                <div><p class="text-xs font-bold text-slate-900">${msg.orderId}</p><p class="text-[10px] text-slate-500">Order Details</p></div>
                            </div>
                            <div class="space-y-2 mb-3">${msg.items.map(item => `<p class="text-sm text-slate-600">${item}</p>`).join('')}</div>
                            <div class="flex justify-between pt-2 border-t border-slate-100 text-sm font-bold text-slate-900">
                                <span>Total</span>
                                <span>${msg.total}</span>
                            </div>
                        </div>
                    `;
                } else if (msg.isImage) {
                    content = `<div class="rounded-3xl overflow-hidden border border-slate-100 shadow-sm bg-white p-1"><img src="${msg.imageUrl}" class="w-full rounded-3xl"></div>`;
                } else if (msg.isLocation) {
                    content = `
                        <div class="bg-white rounded-3xl p-4 shadow-sm border border-slate-100 w-full">
                            <div class="flex items-center gap-3 mb-3">
                                <div class="w-10 h-10 bg-blue-50 rounded-xl flex items-center justify-center text-blue-600"><i class="fas fa-map-marker-alt"></i></div>
                                <div><p class="text-xs font-bold text-slate-900">Location Shared</p></div>
                            </div>
                            <div class="rounded-3xl overflow-hidden h-32">
                                <img src="https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?w=400&h=400&fit=crop" class="w-full h-full object-cover">
                            </div>
                        </div>
                    `;
                } else {
                    content = `
                        <div class="p-3.5 ${isRestaurant ? 'bg-white text-slate-800 chat-bubble-left border border-slate-100' : 'bg-primary-500 text-white chat-bubble-right'} shadow-sm">
                            <p class="text-sm leading-relaxed">${msg.text}</p>
                        </div>
                    `;
                }

                return `
                    <div class="flex ${isRestaurant ? 'justify-start' : 'justify-end'} animate-fade-in">
                        <div class="max-w-[85%]">
                            ${content}
                            <p class="text-[10px] text-slate-400 mt-2 ${isRestaurant ? 'text-left' : 'text-right'}">${msg.time}</p>
                        </div>
                    </div>
                `;
            }).join('');
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        async function sendMessage(text) {
            if (!text.trim() || !CUSTOMER_ID) return;

            try {
                const newMessage = {
                    type: 'customer',
                    text: text,
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };

                const docRef = doc(db, 'restaurant_chats', CUSTOMER_ID);
                await setDoc(docRef, {
                    messages: arrayUnion(newMessage),
                    lastMessage: text,
                    time: 'Just now',
                    unread: 1,
                    name: customerInfo.name,
                    phone: customerInfo.phone,
                    email: customerInfo.email || '',
                    avatar: customerInfo.avatar,
                    online: true,
                }, { merge: true });

                messageInput.value = '';
                messageInput.style.height = 'auto';
            } catch (error) {
                console.error('Customer send failed:', error);
                alert('Failed to send message: ' + error.message);
            }
        }

        sendMessageBtn.addEventListener('click', () => sendMessage(messageInput.value));
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage(messageInput.value);
            }
        });

        suggestionButtons.forEach(btn => {
            btn.addEventListener('click', () => sendMessage(btn.innerText));
        });
    </script>
</body>
</html>
